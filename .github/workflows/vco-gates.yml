name: vco-gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  python-validation:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run pytest
        run: pytest -q

  gates:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run VCO verify gates
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & .\scripts\verify\vibe-pack-regression-matrix.ps1
          & .\scripts\verify\vibe-offline-skills-gate.ps1
          & .\scripts\verify\vibe-router-contract-gate.ps1
          & .\scripts\verify\vibe-routing-stability-gate.ps1 -Strict
          & .\scripts\verify\vibe-version-consistency-gate.ps1
          & .\scripts\verify\vibe-config-parity-gate.ps1
          & .\scripts\verify\vibe-version-packaging-gate.ps1
          & .\scripts\verify\vibe-observability-gate.ps1
          & .\scripts\verify\vibe-ai-rerank-gate.ps1
